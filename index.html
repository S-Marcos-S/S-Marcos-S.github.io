<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Site Pessoal</title>
    <style>
        /* Estilos básicos para o layout */
        body {
            font-family: sans-serif;
            margin: 0;
        }
        header {
            background-color: #333;
            color: white;
            padding: 1rem;
            text-align: center;
            position: sticky;
            top: 0;
        }
        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            justify-content: center;
            gap: 1.5rem;
        }
        nav a {
            color: white;
            text-decoration: none;
            cursor: pointer;
            font-size: 1.1rem;
        }
        nav a:hover {
            text-decoration: underline;
        }
        main {
            padding: 2rem;
        }
        /* Esconde todas as seções por padrão */
        .content-section {
            display: none;
        }
        /* Mostra apenas a seção ativa */
        .content-section.active {
            display: block;
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <ul>
                <!-- Estes links chamam a função showSection() do seu script.js -->
                <li><a onclick="showSection('sobre')">Sobre</a></li>
                <li><a onclick="showSection('projetos')">Projetos</a></li>
                <li><a onclick="showSection('contato')">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- A seção 'sobre' começa visível por ter a classe 'active' -->
        <section id="sobre" class="content-section active">
            <h2>Sobre Mim</h2>
            <p>Aqui você pode escrever um pouco sobre você, suas habilidades e experiências.</p>
        </section>

        <section id="projetos" class="content-section">
            <h2>Meus Projetos</h2>
            <p>Liste aqui os projetos dos quais você mais se orgulha.</p>
        </section>

        <section id="contato" class="content-section">
            <h2>Contato</h2>
            <p>Como as pessoas podem entrar em contato com você.</p>
        </section>
    </main>

    <!-- Carrega o seu script JavaScript -->
    <script src="script.js"></script>

</body>
</html>
